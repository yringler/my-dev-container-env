services:
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passes your host UID/GID into the build so the container user
        # matches you — files created inside have correct host ownership.
        # These are read from the .env file (see .env.example).
        DEV_UID: ${UID}
        DEV_GID: ${GID}
        DEV_USER: ${DEV_USER:-dev}
    container_name: devbox

    # Run as the dev user (matches host UID/GID)
    user: "${UID}:${GID}"

    volumes:
      # Your repos — edit this path to wherever you keep your projects
      - ~/repos:/workspaces

      # Git identity
      - ~/.gitconfig:/root/.gitconfig:ro

      # SSH keys (read-only)
      - ~/.ssh:/root/.ssh:ro

      # Persist the home directory so shell history, dotfiles,
      # and per-user tool installs survive container restarts.
      - devbox-home:/home/${DEV_USER:-dev}

    ports:
      # Node dev servers (Vite, Angular, Next, etc.)
      - "3000-3010:3000-3010"
      # .NET Kestrel
      - "5000-5010:5000-5010"
      # Go / misc
      - "8000-8010:8000-8010"
      # Flutter web
      - "8080:8080"

    stdin_open: true
    tty: true
    restart: unless-stopped

    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1

volumes:
  devbox-home: