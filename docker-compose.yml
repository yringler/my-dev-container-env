services:
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devbox

    volumes:
      # Persist entire home directory
      - devbox-home:/home/dev
      # SSH authorized keys (bind-mount over the volume path)
      - ~/.ssh/id_ed25519.pub:/home/dev/.ssh/authorized_keys:ro

    network_mode: host
    stdin_open: true
    tty: true
    restart: unless-stopped

    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1

volumes:
  devbox-home:
